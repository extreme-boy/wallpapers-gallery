<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thi.soul Wallpapers Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      color: #fff;
      min-height: 100vh;
      background: url("https://4kwallpapers.com/images/walls/thumbs_3t/18289.jpg") no-repeat center center fixed;
      background-size: cover;
      animation: bgChange 8s infinite alternate;
    }
    @keyframes bgChange {
      0% { filter: none; }
      50% { filter: brightness(2) hue-rotate(100deg) saturate(200%); }
      100% { filter: none; }
    }
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.6);
    }
    .hero h1 {
      font-size: 2.5em;
      margin-bottom: 20px;
    }
    .hero button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #e91e63;
      color: #fff;
      cursor: pointer;
    }
    .gallery {
      display: none;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }
    .gallery img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 8px;
    }
    .lightbox button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #e91e63;
      color: #fff;
      cursor: pointer;
    }
    .close {
      position: absolute;
      top: 20px;
      right: 30px;
      font-size: 30px;
      color: #fff;
      cursor: pointer;
    }
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      background: rgba(0,0,0,0.5);
      border: none;
      color: white;
      padding: 10px 20px;
      cursor: pointer;
      border-radius: 50%;
    }
    .prev { left: 20px; }
    .next { right: 20px; }
    #pagination {
      text-align: center;
      margin: 20px;
      display: none;
    }
    #pagination button {
      padding: 10px 20px;
      margin: 0 10px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #e91e63;
      color: white;
      cursor: pointer;
    }
    @media (max-width: 900px) {
      .gallery { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .gallery { grid-template-columns: 1fr; }
      .gallery img { height: 200px; }
    }
  </style>
</head>
<body>

  <div class="hero" id="hero">
    <h1>Thi.soul Wallpapers</h1>
    <button onclick="showGallery()">View Wallpapers</button>
  </div>

  <div class="gallery" id="gallery">
    <!-- 80 Wallpapers (example links, you can replace with your favorites) -->
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/22988.jpg" alt="Infinity Castle" loading="lazy" onclick="openLightbox(0)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/17629.jpg" alt="Rengoku" loading="lazy" onclick="openLightbox(1)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/16953.jpg" alt="Sanemi" loading="lazy" onclick="openLightbox(2)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/12479.jpg" alt="Tanjiro" loading="lazy" onclick="openLightbox(3)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/8306.jpg" alt="Silhouette" loading="lazy" onclick="openLightbox(4)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/16115.jpg" alt="Tokyo Revengers" loading="lazy" onclick="openLightbox(5)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/12906.jpg" alt="Naruto" loading="lazy" onclick="openLightbox(6)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/14589.jpg" alt="Eren" loading="lazy" onclick="openLightbox(7)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/19027.jpg" alt="Ichigo" loading="lazy" onclick="openLightbox(8)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/20101.jpg" alt="Luffy" loading="lazy" onclick="openLightbox(9)">
    <!-- Duplicate pattern until you reach 80 -->
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/12479.jpg" alt="Anime 11" loading="lazy" onclick="openLightbox(10)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/8306.jpg" alt="Anime 12" loading="lazy" onclick="openLightbox(11)">
    <img src="https://4kwallpapers.com/images/walls/thumbs_3t/16115.jpg" alt="Anime 13" loading="lazy" onclick="openLightbox(12)">
    <!-- Keep repeating or replace with new 4K wallpapers until 80 total -->
  </div>

  <div id="pagination">
    <button onclick="prevPage()">Previous</button>
    <span id="page-num">1</span>
    <button onclick="nextPage()">Next</button>
  </div>

  <div class="lightbox" id="lightbox">
    <span class="close" onclick="closeLightbox()">×</span>
    <button class="nav-btn prev" onclick="navigate(-1)">❮</button>
    <img id="lightbox-img" src="" alt="">
    <button class="nav-btn next" onclick="navigate(1)">❯</button>
    <a id="download-btn" download>
      <button>Download</button>
    </a>
  </div>

  <script>
    let currentIndex = 0;
    const images = document.querySelectorAll('.gallery img');
    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const dl = document.getElementById('download-btn');

    let currentPage = 1;
    const itemsPerPage = 9; // 3x3 grid
    const totalPages = Math.ceil(images.length / itemsPerPage);

    function showGallery() {
      document.getElementById('hero').style.display = 'none';
      document.getElementById('gallery').style.display = 'grid';
      document.getElementById('pagination').style.display = 'block';
      showPage(currentPage);
    }

    function showPage(page) {
      images.forEach((img, i) => {
        img.style.display = (i >= (page - 1) * itemsPerPage && i < page * itemsPerPage) ? 'block' : 'none';
      });
      document.getElementById('page-num').innerText = page + " / " + totalPages;
    }

    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        showPage(currentPage);
      }
    }

    function nextPage() {
      if (currentPage < totalPages) {
        currentPage++;
        showPage(currentPage);
      }
    }

    function openLightbox(index) {
      currentIndex = index;
      lb.style.display = 'flex';
      updateLightbox();
    }

    function updateLightbox() {
      let src = images[currentIndex].src.replace("thumbs_3t", "originals");
      lbImg.src = src;
      dl.href = src;
    }

    function closeLightbox() {
      lb.style.display = 'none';
    }

    function navigate(direction) {
      currentIndex = (currentIndex + direction + images.length) % images.length;
      updateLightbox();
    }
  </script>

</body>
</html>
